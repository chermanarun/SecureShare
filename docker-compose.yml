services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: secureshare
      POSTGRES_USER: secureshare
      POSTGRES_PASSWORD: secureshare
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureshare -d secureshare"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  openfga:
    image: openfga/openfga:v1.8
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_LOG_FORMAT: json
      OPENFGA_AUTHN_METHOD: preshared
      OPENFGA_AUTHN_PRESHARED_KEYS: ${SECURESHARE_OPENFGA_PRESHARED_KEY:?set in .env}
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=openfga:8081"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      SECURESHARE_ENVIRONMENT: dev
      SECURESHARE_DATABASE_URL: postgresql+psycopg://secureshare:secureshare@postgres:5432/secureshare
      SECURESHARE_OPENFGA_API_URL: http://openfga:8080
      SECURESHARE_OPENFGA_STORE_ID: ${SECURESHARE_OPENFGA_STORE_ID:-dev-store}
      SECURESHARE_OPENFGA_AUTHORIZATION_MODEL_ID: ${SECURESHARE_OPENFGA_AUTHORIZATION_MODEL_ID:-}
      SECURESHARE_OPENFGA_API_TOKEN: ${SECURESHARE_OPENFGA_PRESHARED_KEY:?set in .env}
      SECURESHARE_JWT_SECRET: ${SECURESHARE_JWT_SECRET:?set in .env}
      SECURESHARE_MACAROON_ROOT_KEY: ${SECURESHARE_MACAROON_ROOT_KEY:?set in .env}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api:ro
      - ./scripts:/app/scripts:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro

volumes:
  postgres_data:
