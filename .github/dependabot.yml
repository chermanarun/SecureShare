version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"
    groups:
      python-runtime:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn*"
          - "pydantic*"
      persistence:
        patterns:
          - "sqlalchemy"
          - "alembic"
          - "psycopg*"
      test-tooling:
        dependency-type: "development"

  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Kolkata"
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Kolkata"
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Asia/Kolkata"
    cooldown:
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
      include:
        - "*"
